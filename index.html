<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Catatan</title>
    <style>
        /* --- SEMUA CSS DI SINI --- */
        body {
            background-color: #1a1a1b;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-icon {
            font-size: 24px;
            cursor: pointer;
        }
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        input, textarea {
            background-color: #272729;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            color: white;
            font-size: 16px;
        }
        textarea {
            height: 150px;
            resize: none;
        }
        button#addBtn {
            background-color: white;
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
        }
        button#addBtn:hover {
            background-color: #ddd;
        }
        .notes-display {
            margin-top: 40px;
        }
        hr {
            border: 0.5px solid #333;
            margin-bottom: 20px;
        }
        .note-card {
            background-color: #212529;
            border: 1px solid #343a40;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .note-card h3 {
            margin-top: 0;
            margin-bottom: 5px;
        }
        .note-date {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 15px;
        }
        .note-content {
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-delete {
            background: none;
            border: 1px solid #444;
            color: #ff4d4d;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
        .btn-archive {
            background: none;
            border: 1px solid #444;
            color: #ffcc00;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Buat Catatan</h1>
            <div class="search-icon">🔍</div>
        </header>

        <section class="input-section">
            <input type="text" id="noteTitle" placeholder="Judul">
            <textarea id="noteBody" placeholder="Isi catatan..."></textarea>
            <button id="addBtn">TAMBAH CATATAN</button>
        </section>

        <section class="notes-display">
            <h2>Catatan</h2>
            <hr>
            <div id="notesList">
                </div>
        </section>
    </div>

    <script>
        // --- SEMUA JAVASCRIPT DI SINI ---
        document.addEventListener('DOMContentLoaded', () => {
            const addBtn = document.getElementById('addBtn');
            const titleInput = document.getElementById('noteTitle');
            const bodyInput = document.getElementById('noteBody');
            const notesList = document.getElementById('notesList');

            addBtn.addEventListener('click', () => {
                const title = titleInput.value.trim();
                const body = bodyInput.value.trim();

                // Validasi agar tidak kosong
                if (title === '' || body === '') {
                    alert('Judul dan isi catatan tidak boleh kosong ya!');
                    return;
                }

                // Membuat format tanggal Indonesia
                const date = new Date();
                const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                const formattedDate = date.toLocaleDateString('id-ID', options);

                // Buat elemen catatan baru
                const noteCard = document.createElement('div');
                noteCard.classList.add('note-card');

                noteCard.innerHTML = `
                    <h3>${title}</h3>
                    <p class="note-date">${formattedDate}</p>
                    <p class="note-content">${body}</p>
                    <div class="actions">
                        <button class="btn-delete">Hapus</button>
                        <button class="btn-archive">Arsipkan</button>
                    </div>
                `;

                // Logika tombol hapus di dalam kartu catatan
                noteCard.querySelector('.btn-delete').addEventListener('click', () => {
                    noteCard.remove();
                });

                // Masukkan catatan paling baru di posisi paling atas
                notesList.prepend(noteCard);

                // Kosongkan kembali form input
                titleInput.value = '';
                bodyInput.value = '';
            });
        });
    </script>
</body>
</html>
