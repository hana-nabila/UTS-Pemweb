<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="card" id="generatorCard">
            <div class="header">
                <div class="logo-section">
                    <div class="icon-box">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </div>
                    <h1>AI Image Generator</h1>
                </div>
                <button class="theme-toggle" id="themeBtn">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>

            <div class="input-group">
                <textarea placeholder="Describe your imagination in detail..."></textarea>
                <div class="dice-icon">
                    <i class="fa-solid fa-dice-five"></i>
                </div>
            </div>

            <div class="controls">
                <div class="select-wrapper">
                    <select id="model">
                        <option value="" disabled selected>Select Model</option>
                        <option value="FLUX.1-dev">FLUX.1-dev</option>
                        <option value="FLUX.1-schnell">FLUX.1-schnell</option>
                        <option value="Stable Diffusion XL">Stable Diffusion XL</option>
                        <option value="Stable Diffusion 1.5">Stable Diffusion 1.5</option>
                        <option value="Stable Diffusion 3">Stable Diffusion 3</option>
                        <option value="Openjourney">Openjourney</option>
                    </select>
                </div>

                <div class="select-wrapper">
                    <select id="imageCount">
                        <option value="" disabled selected>Image Count</option>
                        <option value="1">1 Image</option>
                        <option value="2">2 Images</option>
                        <option value="3">3 Images</option>
                        <option value="4">4 Images</option>
                    </select>
                </div>

                <div class="select-wrapper">
                    <select id="aspectRatio">
                        <option value="" disabled selected>Aspect Ratio</option>
                        <option value="1:1">Square (1:1)</option>
                        <option value="16:9">Landscape (16:9)</option>
                        <option value="9:16">Portrait (9:16)</option>
                    </select>
                </div>

                <button class="generate-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
                </button>
            </div>

            <div class="results" id="resultArea">
                <p class="no-result">No images generated yet. Use the Generate button.</p>
            </div>
        </div>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
